name: Build WASM & Upload to R2

on:
  push:
    branches: [main]
    paths:
      - 'web-apps/**'
      - 'wasm/**'
      - 'patches/**'
      - 'dictionaries/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.3.0). Leave empty to auto-generate.'
        required: false

jobs:
  build:
    name: Build OnlyOffice WASM
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('wasm/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build WASM via Docker
        run: |
          docker compose run --rm build
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Verify output exists
        run: |
          if [ ! -d "output/web-apps/apps" ]; then
            echo "ERROR: output/web-apps/apps/ tidak ditemukan"
            echo "Isi output/:"
            ls -lah output/ 2>/dev/null || echo "(output/ kosong atau tidak ada)"
            exit 1
          fi
          echo "Build output:"
          ls -lah output/web-apps/apps/

      - name: Inject CACHE_VERSION ke sw.js
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Ganti placeholder __CACHE_VERSION dengan versi aktual
          sed -i "s|self.__CACHE_VERSION || 'naskah-v1'|'naskah-${VERSION}'|g" output/sw.js
          echo "sw.js cache version: naskah-${VERSION}"

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync output/ s3://${{ secrets.CF_R2_BUCKET_NAME }}/wasm/${{ steps.version.outputs.VERSION }}/ \
            --endpoint-url ${{ secrets.CF_R2_ENDPOINT }} \
            --no-progress
          echo "Upload selesai ke: ${{ secrets.CF_R2_ENDPOINT }}/${{ secrets.CF_R2_BUCKET_NAME }}/wasm/${{ steps.version.outputs.VERSION }}/"

      - name: Summary
        run: |
          echo "## ✅ WASM Build Selesai" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Versi:** \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL CDN:**" >> $GITHUB_STEP_SUMMARY
          echo "\`https://cdn.naskah.id/wasm/${{ steps.version.outputs.VERSION }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Langkah berikutnya:**" >> $GITHUB_STEP_SUMMARY
          echo "Update \`NUXT_PUBLIC_WASM_VERSION=${{ steps.version.outputs.VERSION }}\` di repo platform." >> $GITHUB_STEP_SUMMARY